# You can use it to add commands that run after login to macOS user session.
# 'start-at-login' needs to be 'true' for 'after-login-command' to work
# Available commands: https://nikitabobko.github.io/AeroSpace/commands
after-login-command = []

# You can use it to add commands that run after AeroSpace startup.
# 'after-startup-command' is run after 'after-login-command'
# Available commands : https://nikitabobko.github.io/AeroSpace/commands
after-startup-command = [
  'exec-and-forget borders active_color=0xffffa800 inactive_color=0xff494d64 width=5.0'
]

# Start AeroSpace at login
start-at-login = true

# Normalizations. See: https://nikitabobko.github.io/AeroSpace/guide#normalization
enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true

# See: https://nikitabobko.github.io/AeroSpace/guide#layouts
# The 'accordion-padding' specifies the size of accordion padding
# You can set 0 to disable the padding feature
accordion-padding = 30

# Possible values: tiles|accordion
default-root-container-layout = 'tiles'

# Possible values: horizontal|vertical|auto
# 'auto' means: wide monitor (anything wider than high) gets horizontal orientation,
#               tall monitor (anything higher than wide) gets vertical orientation
default-root-container-orientation = 'auto'

# Mouse follows focus when focused monitor changes
# Drop it from your config, if you don't like this behavior
# See https://nikitabobko.github.io/AeroSpace/guide#on-focus-changed-callbacks
# See https://nikitabobko.github.io/AeroSpace/commands#move-mouse
# Fallback value (if you omit the key): on-focused-monitor-changed = []
on-focused-monitor-changed = ['move-mouse monitor-lazy-center']

# You can effectively turn off macOS "Hide application" (cmd-h) feature by toggling this flag
# Useful if you don't use this macOS feature, but accidentally hit cmd-h or cmd-alt-h key
# Also see: https://nikitabobko.github.io/AeroSpace/goodies#disable-hide-app
automatically-unhide-macos-hidden-apps = false

# Possible values: (qwerty|dvorak|colemak)
# See https://nikitabobko.github.io/AeroSpace/guide#key-mapping
[key-mapping]
    preset = 'qwerty'

# Gaps between windows (inner-*) and between monitor edges (outer-*).
# Possible values:
# - Constant:     gaps.outer.top = 8
# - Per monitor:  gaps.outer.top = [{ monitor.main = 16 }, { monitor."some-pattern" = 32 }, 24]
#                 In this example, 24 is a default value when there is no match.
#                 Monitor pattern is the same as for 'workspace-to-monitor-force-assignment'.
#                 See:
#                 https://nikitabobko.github.io/AeroSpace/guide#assign-workspaces-to-monitors
[gaps]
    inner.horizontal = 10
    inner.vertical =   10
    outer.left =       10
    outer.bottom =     10
    outer.top =        10
    outer.right =      10

[workspace-to-monitor-force-assignment]
  1 = 'main'      # Code principal
  2 = 'main'      # Kitty
  3 = 'main'      # Divers (Bruno, etc.)
  4 = 'main'      # Dev mobile (Xcode)
  5 = 'main'      # Dev mobile (Android Studio)
  6 = 'secondary' # Finicky / Chrome Canary / Firefox Developer
  7 = 'secondary' # Simulateurs Xcode / Émulateurs Android
  8 = 'secondary' # Musique / Teams
  9 = 'secondary' # Divers Floating

# Applications assignment to workspaces
[[on-window-detected]]
if.app-id = 'com.microsoft.VSCodeInsiders'
run = ['move-node-to-workspace 1', 'layout tiles']

[[on-window-detected]]
if.app-id = 'dev.zed.Zed'
run = ['move-node-to-workspace 1', 'layout tiles']

[[on-window-detected]]
if.app-id = 'net.kovidgoyal.kitty'
run = ['move-node-to-workspace 2', 'layout tiles']

[[on-window-detected]]
if.app-id = 'com.usebruno.app'
run = ['move-node-to-workspace 3', 'layout tiles']

[[on-window-detected]]
if.app-id = 'com.apple.dt.Xcode'
run = ['move-node-to-workspace 4', 'layout tiles']

[[on-window-detected]]
if.app-id = 'com.google.android.studio'
if.window-title-regex-substring = '^(?!Running Devices).*$'
run = ['move-node-to-workspace 5', 'layout tiles']

[[on-window-detected]]
if.app-id = 'com.google.Chrome.canary'
run = ['move-node-to-workspace 6', 'layout tiles']

[[on-window-detected]]
if.app-id = 'org.mozilla.firefoxdeveloperedition'
run = ['move-node-to-workspace 6', 'layout tiles']

# Simulateurs iOS
[[on-window-detected]]
if.app-id = 'com.apple.iphonesimulator'
run = ['move-node-to-workspace 7', 'layout tiles']

# Fenêtre "Running Devices" d'Android Studio
[[on-window-detected]]
if.app-id = 'com.google.android.studio'
if.window-title-regex-substring = 'Running Devices'
run = ['move-node-to-workspace 7', 'layout tiles']

[[on-window-detected]]
if.app-id = 'com.microsoft.teams2'
run = ['move-node-to-workspace 8', 'layout tiles']

[[on-window-detected]]
if.app-id = 'com.apple.Music'
run = ['move-node-to-workspace 9', 'layout tiles']

# Applications en FLOATING
[[on-window-detected]]
if.app-id = 'com.apple.finder'
run = 'layout floating'

[[on-window-detected]]
if.app-id = 'com.apple.systempreferences'
run = 'layout floating'

[[on-window-detected]]
if.app-id = 'com.apple.ActivityMonitor'
run = 'layout floating'

[[on-window-detected]]
if.app-id = 'com.apple.screencaptureui'
run = 'layout floating'

[[on-window-detected]]
if.app-id = 'com.apple.Preview'
run = 'layout floating'

[[on-window-detected]]
if.app-id = 'com.apple.Passwords'
run = 'layout floating'

[[on-window-detected]]
if.app-id = 'com.apple.keychainaccess'
run = 'layout floating'

[[on-window-detected]]
if.app-id = 'notion.id'
run = ['move-node-to-workspace 3', 'layout tiles']

# 'main' binding mode declaration
# See: https://nikitabobko.github.io/AeroSpace/guide#binding-modes
# 'main' binding mode must be always presented
# Fallback value (if you omit the key): mode.main.binding = {}
[mode.main.binding]

    # See: https://nikitabobko.github.io/AeroSpace/commands#focus
    cmd-left = 'focus left'
    cmd-down = 'focus down'
    cmd-up = 'focus up'
    cmd-right = 'focus right'

    # See: https://nikitabobko.github.io/AeroSpace/commands#move
    cmd-shift-left = 'move left'
    cmd-shift-down = 'move down'
    cmd-shift-up = 'move up'
    cmd-shift-right = 'move right'

    # See: https://nikitabobko.github.io/AeroSpace/commands#workspace
    cmd-1 = 'workspace 1'
    cmd-2 = 'workspace 2'
    cmd-3 = 'workspace 3'
    cmd-4 = 'workspace 4'
    cmd-5 = 'workspace 5'
    cmd-6 = 'workspace 6'
    cmd-7 = 'workspace 7'
    cmd-8 = 'workspace 8'
    cmd-9 = 'workspace 9'

    # See: https://nikitabobko.github.io/AeroSpace/commands#move-node-to-workspace
    cmd-shift-1 = 'move-node-to-workspace 1 --focus-follows-window'
    cmd-shift-2 = 'move-node-to-workspace 2 --focus-follows-window'
    cmd-shift-3 = 'move-node-to-workspace 3 --focus-follows-window'
    cmd-shift-4 = 'move-node-to-workspace 4 --focus-follows-window'
    cmd-shift-5 = 'move-node-to-workspace 5 --focus-follows-window'
    cmd-shift-6 = 'move-node-to-workspace 6 --focus-follows-window'
    cmd-shift-7 = 'move-node-to-workspace 7 --focus-follows-window'
    cmd-shift-8 = 'move-node-to-workspace 8 --focus-follows-window'
    cmd-shift-9 = 'move-node-to-workspace 9 --focus-follows-window'

    # See: https://nikitabobko.github.io/AeroSpace/commands#mode
    alt-shift-f = 'layout tiles floating'
    alt-shift-space = 'layout floating tiling'
    alt-shift-t = 'layout accordion tiles'
